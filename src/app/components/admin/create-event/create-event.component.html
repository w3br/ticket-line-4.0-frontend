<div class="container mt-5 profile-page mb-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <h4 class="mb-4">
        {{ eventId ? 'Edit Event' : 'Create Event' }}
      </h4>

      <form #f="ngForm" (ngSubmit)="onSubmit(f)" class="mt-3" novalidate>
        <!-- Title -->
        <div class="form-group mb-3">
          <label for="title">Title*</label>
          <input id="title" name="title" class="form-control" [(ngModel)]="event.title" required maxlength="200"
            #title="ngModel" />
          <div class="invalid-feedback d-sm-block" *ngIf="title.invalid && (title.dirty || title.touched)">
            Title is required.
          </div>
        </div>

        <!-- Description -->
        <div class="form-group mb-3">
          <label for="description">Description*</label>
          <textarea id="description" name="description" class="form-control fixed-textarea fixed-textarea--description"
            [(ngModel)]="event.description" required maxlength="500" #description="ngModel"></textarea>
          <div class="invalid-feedback d-sm-block"
            *ngIf="description.invalid && (description.dirty || description.touched)">
            Description is required.
          </div>
        </div>

        <!-- Artist -->
        <div class="form-group mb-3">
          <label for="artist">Artist*</label>

          <div class="d-flex flex-wrap mb-2" *ngIf="selectedArtists.length > 0">
            <span *ngFor="let artist of selectedArtists; let i = index" class="badge bg-secondary me-1 mb-1 p-2">
              {{artist}}
              <button type="button" class="btn-close btn-close-white ms-2" aria-label="Remove"
                (click)="removeArtist(i)"></button>
            </span>
          </div>

          <input id="artist" type="text" class="form-control" [(ngModel)]="artistInputModel" [ngbTypeahead]="search"
            (selectItem)="onArtistSelect($event)" (keydown.enter)="onArtistEnter($event)" name="artistInput"
            [required]="selectedArtists.length === 0" />

          <div class="invalid-feedback d-sm-block"
            *ngIf="selectedArtists.length === 0 && (f.submitted || isSubmitting)">
            At least one artist is required.
          </div>
        </div>


        <div class="form-group mb-3">
          <label for="eventType">Event Type</label>
          <select id="eventType" class="form-control" name="type" [(ngModel)]="event.type" required>

            <option value="" disabled>Select type</option>

            <option *ngFor="let t of eventTypes" [value]="t.key">
              {{ t.label }}
            </option>

          </select>
        </div>
        <div class="form-group mb-3">
          <label for="eventCategory">Event Category</label>
          <select id="eventCategory" class="form-control" name="category" [(ngModel)]="event.category" required>

            <option value="" disabled>Select category</option>

            <option *ngFor="let c of eventCategories" [value]="c.key">
              {{ c.label }}
            </option>

          </select>
        </div>

        <!-- Performances -->
        <div class="form-group mb-3">
          <label>Performances</label> <br>
          <button type="button" class="btn btn-outline-secondary btn-sm mb-2" (click)="addPerformance()">
            Add Performance
          </button>

          <div *ngFor="let performance of performances; let i = index" class="card mb-2">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Performance {{ i + 1 }}</h6>
                <button type="button" class="btn btn-sm btn-outline-danger" (click)="removePerformance(i)">
                  Remove
                </button>
              </div>

              <div class="form-group mb-2">
                <label [for]="'hall-' + i">Hall*</label>
                <select [id]="'hall-' + i" class="form-control" [(ngModel)]="performance.hallId" [name]="'hall-' + i"
                  required>
                  <option [value]="null" disabled>Select a hall</option>
                  <option *ngFor="let hall of halls" [value]="hall.id">
                    {{ hall.label }}
                  </option>
                </select>
              </div>

              <div class="form-group mb-2">
                <label [for]="'startTime-' + i">Start Time*</label>
                <input [id]="'startTime-' + i" type="datetime-local" class="form-control"
                  [(ngModel)]="performance.startTime" [name]="'startTime-' + i" required />
              </div>

              <div class="form-group mb-2">
                <label [for]="'endTime-' + i">End Time (optional)</label>
                <input [id]="'endTime-' + i" type="datetime-local" class="form-control"
                  [(ngModel)]="performance.endTime" [name]="'endTime-' + i" />
              </div>
            </div>
          </div>
        </div>

        <!-- Images -->
        <div class="form-group mb-3">
          <label for="images">Images</label>
          <input id="images" type="file" class="form-control custom-file-input" (change)="onFileChange($event)" multiple
            accept="image/*" />

          <small class="form-text text-muted" style="font-size:0.75rem">
            JPEG, PNG, GIF, WebP — max 1 MB / image.
          </small>

          <div class="previews-grid mt-2" *ngIf="selectedFilesPreview.length">
            <div class="preview-card" *ngFor="let preview of selectedFilesPreview; let i = index">
              <img [src]="preview" alt="Selected image preview" class="preview-img" />

              <button type="button" class="preview-remove-btn" (click)="removeSelectedImage(i)"
                aria-label="Remove image" title="Remove image">
                <i class="bi bi-trash" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-dark w-100 profile-submit-btn mb-2" [disabled]="f.invalid || isSubmitting">
          {{ eventId ? 'Update' : 'Create' }}
        </button>
      </form>

    </div>
  </div>
</div>
