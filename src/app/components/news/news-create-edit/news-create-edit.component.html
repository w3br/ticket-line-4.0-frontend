<div class="container mt-5 profile-page mb-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <h4 class="mb-4">
        {{ mode === NewsCreateEditMode.create ? 'Create News' : 'Edit News' }}
      </h4>

      <form #f="ngForm" (ngSubmit)="onSubmit(f)" class="mt-3" novalidate>
        <!-- Title -->
        <div class="form-group mb-3">
          <label for="title">Title*</label>
          <input
            id="title"
            name="title"
            class="form-control"
            [(ngModel)]="news.title"
            required
            maxlength="200"
            #title="ngModel"
          />
          <div class="invalid-feedback d-sm-block"
               *ngIf="title.invalid && (title.dirty || title.touched)">
            Title is required.
          </div>
        </div>

        <!-- Summary -->
        <div class="form-group mb-3">
          <label for="summary">Summary*</label>
          <textarea
            id="summary"
            name="summary"
            class="form-control fixed-textarea fixed-textarea--summary"
            [(ngModel)]="news.summary"
            required
            maxlength="500"
            #summary="ngModel"
          ></textarea>
          <div class="invalid-feedback d-sm-block"
               *ngIf="summary.invalid && (summary.dirty || summary.touched)">
            Summary is required.
          </div>
        </div>

        <!-- Full text -->
        <div class="form-group mb-3">
          <label for="fullText">Full Text*</label>
          <textarea
            id="fullText"
            name="fullText"
            class="form-control fixed-textarea fixed-textarea--full"
            rows="6"
            [(ngModel)]="news.fullText"
            required
            #fullText="ngModel"
          ></textarea>
          <div class="invalid-feedback d-sm-block"
               *ngIf="fullText.invalid && (fullText.dirty || fullText.touched)">
            Full Text is required.
          </div>
        </div>

        <!-- Images -->
        <div class="form-group mb-3">
          <label for="images">Images</label>
          <input
            id="images"
            type="file"
            class="form-control custom-file-input"
            (change)="onFileChange($event)"
            multiple
            accept="image/*"
          />

          <small class="form-text text-muted" style="font-size:0.75rem">
            JPEG, PNG, GIF, WebP — max 1 MB / image.
          </small>

          <div class="previews-grid mt-2" *ngIf="selectedFilesPreview.length">
            <div class="preview-card" *ngFor="let preview of selectedFilesPreview; let i = index">
              <img [src]="preview" alt="Selected image preview" class="preview-img" />

              <button
                type="button"
                class="preview-remove-btn"
                (click)="removeSelectedImage(i)"
                aria-label="Remove image"
                title="Remove image"
              >
                <i class="bi bi-trash" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <button
          type="submit"
          class="btn btn-dark w-100 profile-submit-btn mb-2"
          [disabled]="f.invalid || isSubmitting"
        >
          {{ mode === NewsCreateEditMode.create ? 'Create' : 'Save changes' }}
        </button>
      </form>

    </div>
  </div>
</div>
