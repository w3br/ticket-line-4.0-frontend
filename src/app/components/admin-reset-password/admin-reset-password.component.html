<div class="container mt-5 profile-page">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <h4 class="mb-4">Reset Password</h4>

      <form
        #resetForm="ngForm"
        (ngSubmit)="onSubmit(resetForm)"
        class="mt-3"
        novalidate>

        <div class="form-group mb-3">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [value]="email"
            disabled
          />
        </div>

        <div class="form-group mb-3">
          <label for="newPassword">New password</label>
          <input
            id="newPassword"
            class="form-control"
            name="newPassword"
            type="password"
            [(ngModel)]="newPassword"
            required
            minlength="8"
            #newPasswordCtrl="ngModel"
            [class.is-invalid]="newPasswordCtrl.invalid && (newPasswordCtrl.dirty || newPasswordCtrl.touched)"
          />

          <div
            class="invalid-feedback d-sm-block"
            *ngIf="newPasswordCtrl.invalid && (newPasswordCtrl.dirty || newPasswordCtrl.touched)">
            <div *ngIf="newPasswordCtrl.errors?.['required']">
              Password is required.
            </div>
            <div *ngIf="newPasswordCtrl.errors?.['minlength']">
              Password must be at least 8 characters.
            </div>
          </div>
        </div>

        <!-- REPEAT PASSWORD -->
        <div class="form-group mb-4">
          <label for="repeatPassword">Repeat new password</label>
          <input
            id="repeatPassword"
            class="form-control"
            name="repeatPassword"
            type="password"
            [(ngModel)]="repeatPassword"
            required
            minlength="8"
          />
        </div>

        <!-- SUBMIT -->
        <button
          type="submit"
          class="btn btn-dark w-100 profile-submit-btn"
          [disabled]="submitting">
          {{ submitting ? 'Submitting…' : 'Reset password' }}
        </button>

      </form>

    </div>
  </div>
</div>
