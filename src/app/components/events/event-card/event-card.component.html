<!-- src/app/components/events/event-card/event-card.component.html -->
<div class="event-card">
  <img class="event-card-img" [src]="event.imageUrl" alt="event image" />

  <div class="event-card-body">
    <div class="event-actions" *ngIf="isAdmin()">
      <a
        class="btn btn-sm responsive-edit-button event-card-icon-btn"
        [routerLink]="['/admin/createEvent', event.id, 'edit']"
        aria-label="Edit Event"
        title="Edit"
      >
        <i class="bi bi-pencil-square"></i>
      </a>

      <button
        type="button"
        class="btn btn-sm responsive-danger-button event-card-icon-btn"
        (click)="eventForDeletion = event"
        [attr.data-bs-toggle]="'modal'"
        [attr.data-bs-target]="'#delete-dialog-' + event.id"
        aria-label="Delete event"
        title="Delete"
      >
        <i class="bi bi-trash"></i>
      </button>
    </div>

    <div class="event-card-title">{{ event.title }}</div>

    <div class="event-card-description">{{ event.description }}</div>

    <div class="event-card-meta">
      <div>
        <span class="event-type">{{ event.type }}</span>
        <span *ngIf="event.artistName"> · {{ event.artistName }}</span>
      </div>
      <div class="performance-count" *ngIf="event.performanceCount !== undefined">
        {{ event.performanceCount }} {{ event.performanceCount === 1 ? 'performance' : 'performances' }} coming up!
      </div>
    </div>

    <button type="button" class="btn-event-detail" (click)="goToEventDetails()">
      Details & Tickets
    </button>
  </div>
</div>

<!-- Delete dialog (unique id per card) -->
<div class="modal fade" [id]="'delete-dialog-' + event.id" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Delete event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <ng-container *ngIf="eventForDeletion; else noEvent">
          <p class="mb-0">
            Do you really want to delete
            <strong>{{ eventForDeletion.title }}</strong>?
          </p>
        </ng-container>
        <ng-template #noEvent>
          <p class="mb-0">No event selected.</p>
        </ng-template>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button
          type="button"
          class="btn btn-danger"
          (click)="confirmDelete(eventForDeletion)"
          data-bs-dismiss="modal"
          [disabled]="!eventForDeletion || isDeleting"
        >
          {{ isDeleting ? 'Deleting…' : 'Delete' }}
        </button>
      </div>

    </div>
  </div>
</div>
