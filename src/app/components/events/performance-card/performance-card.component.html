<div class="event-card">

  <img
    class="event-card-img"
    [src]="performance.eventImageUrl || 'assets/placeholder-event.jpg'"
    alt="event image"
  />

  <div class="event-card-body">
    <div class="event-card-title">
      {{ performance.eventTitle }}
    </div>

    <div class="event-card-description">
      {{ performance.venueName }} · {{ performance.hallName }}
    </div>

    <div class="event-card-meta">
      <span>
        {{ performance.startTime | date:'short' }}
      </span>
    </div>

    <div class="event-card-actions">

    <button
      type="button"
      class="btn-event-detail"
      (click)="goToSeatingPlan()">
      Buy Tickets
    </button>

    <button
      type="button"
      class="btn-event-detail secondary"
      (click)="goToEvent()"
      *ngIf="!isDetailView">
      View Details
    </button>

    </div>
  </div>
</div>
