<div class="container mt-5 profile-page mb-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <h4 class="mb-4">{{ isEditMode ? 'Update Merchandise' : 'Create Merchandise' }}</h4>

      <form #f="ngForm" (ngSubmit)="onSubmit(f)" novalidate>

        <div class="form-group mb-3">
          <label for="description">Description *</label>
          <input
            id="description"
            name="description"
            class="form-control"
            [(ngModel)]="model.description"
            required
            maxlength="100"
           />
        </div>

        <div class="form-group mb-3">
          <label for="price">Price (€) *</label>
          <input
            id="price"
            name="price"
            type="number"
            step="0.01"
            min="0"
            class="form-control"
            [(ngModel)]="model.price"
          />
        </div>

        <div class="form-group mb-3">
          <label for="pointCost">Point cost *</label>
          <input
            id="pointCost"
            name="pointCost"
            type="number"
            min="1"
            class="form-control"
            [(ngModel)]="model.pointCost"
          />
        </div>

        <div class="form-group mb-3">
          <label for="image">Image</label>
          <input
            id="image"
            type="file"
            class="form-control"
            (change)="onFileChange($event)"
            accept="image/*"
          />

          <div class="mt-2" *ngIf="previewUrl || existingImageUrl">
            <img [src]="previewUrl || existingImageUrl" class="merch-image-preview" alt="preview">
          </div>
        </div>

        <button class="btn btn-dark w-100 profile-submit-btn" [disabled]="f.invalid || isSubmitting">
          @if (isEditMode) {
            {{ isSubmitting ? 'Updating…' : 'Update' }}
          } @else {
            {{ isSubmitting ? 'Creating…' : 'Create' }}
          }
        </button>

      </form>
    </div>
  </div>
</div>
